name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "============================================================"
            echo "STOP: HF_TOKEN secret is not set in this GitHub repository."
            echo ""
            echo "To fix:"
            echo "  1. Go to https://huggingface.co/settings/tokens"
            echo "  2. Create a token with WRITE permission"
            echo "  3. In this GitHub repo go to:"
            echo "     Settings > Secrets and variables > Actions"
            echo "  4. Click 'New repository secret'"
            echo "     Name : HF_TOKEN"
            echo "     Value: your HuggingFace write token"
            echo "============================================================"
            exit 1
          fi
          echo "HF_TOKEN is present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 .github/scripts/deploy_hf.py
