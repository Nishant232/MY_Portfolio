name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set."
            exit 1
          fi
          echo "HF_TOKEN is present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Reset HF Space (wipe old git/LFS history)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet
          python3 .github/scripts/deploy_hf.py

      - name: Push dist to HF Space via git-lfs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd dist

          git init
          git lfs install

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          # Track binary model/shader files as LFS so HF accepts them
          printf '*.glb filter=lfs diff=lfs merge=lfs -text\n' >  .gitattributes
          printf '*.hdr filter=lfs diff=lfs merge=lfs -text\n' >> .gitattributes
          printf '*.wasm filter=lfs diff=lfs merge=lfs -text\n' >> .gitattributes

          git add .
          git commit -m "Deploy portfolio"
          git branch -M main

          REMOTE="https://Nishant00:${HF_TOKEN}@huggingface.co/spaces/Nishant00/portfolio"

          # Upload LFS objects first, then push the commit
          git lfs push --all "$REMOTE"
          git push --force "$REMOTE" HEAD:main
