name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --quiet
          python3 << 'PYEOF'
          import os, sys
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN", "")
          if not token:
              print("ERROR: HF_TOKEN secret is not set.")
              print("Go to: GitHub repo > Settings > Secrets and variables > Actions > New repository secret")
              print("Name: HF_TOKEN  |  Value: your HuggingFace write token")
              sys.exit(1)

          api = HfApi(token=token)

          print("Step 1/2 — Creating Space if it does not exist...")
          api.create_repo(
              repo_id="Nishant00/portfolio",
              repo_type="space",
              space_sdk="static",
              exist_ok=True,
              private=False,
          )

          print("Step 2/2 — Uploading build files...")
          api.upload_folder(
              folder_path="dist",
              repo_id="Nishant00/portfolio",
              repo_type="space",
          )

          print("")
          print("Deployed! Live at: https://nishant00-portfolio.hf.space")
          PYEOF
