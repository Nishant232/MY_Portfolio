name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check HF_TOKEN secret
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN secret is not set."
            echo "Go to: GitHub repo > Settings > Secrets and variables > Actions"
            echo "Add secret  Name: HF_TOKEN  Value: HF write token from huggingface.co/settings/tokens"
            exit 1
          fi
          echo "HF_TOKEN is present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install huggingface_hub
        run: pip install huggingface_hub --quiet

      - name: Reset HF Space and deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 .github/scripts/deploy_hf.py
